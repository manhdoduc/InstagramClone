apiVersion: apps/v1
kind: Deployment
metadata:
  name: instagramseq-app
  namespace: cloud-native-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: instagramseq-app
  template:
    metadata:
      labels:
        app: instagramseq-app
    spec:
      containers:
      - name: instagramseq-app
        image: datalust/seq:latest
        ports:
        - containerPort: 5341
        - containerPort: 80
        env:
         - name: ACCEPT_EULA
           value: "Y"
         - name: SEQ_FIRSTRUN_NOAUTHENTICATION
           value: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: instagramseq
  namespace: cloud-native-dev
spec:
  selector:
    app: instagramseq-app  
  type: NodePort  
  ports:
    - protocol: TCP 
      port: 80
      targetPort: 80  
      nodePort: 31534
---
apiVersion: v1
kind: Service
metadata:
  name: instagramseq-svc
  namespace: cloud-native-dev
spec:
  clusterIP: None # headless service
  selector:
    app: instagramseq-app
  ports:
    - protocol: TCP
      port: 5341
      targetPort: 5341